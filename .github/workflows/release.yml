name: Release

# Triggers when package.json version is bumped on a push to main.
# See RELEASING.md for the full release process.
#
# One-time npm setup (OIDC Trusted Publishing — no long-lived secrets):
#   1. npmjs.com → package settings → Publish access → Trusted Publishers
#   2. Add: GitHub Actions, owner=OpenBox-AI, repo=openbox-n8n-sdk, workflow=release.yml
#   3. Leave NPM_TOKEN unset — GitHub OIDC is used automatically.
#
# Fallback: add NPM_TOKEN to repo secrets (Settings → Secrets → Actions).

on:
  push:
    branches:
      - main
    paths:
      - 'custom-node/package.json'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  GITLEAKS_VERSION: "8.30.0"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Governance
# Checks required files exist and determines if the version is new (not yet on npm).
# Skips all subsequent stages if the version already exists on npm.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_publish: ${{ steps.check_npm.outputs.should_publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify required files exist
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "custom-node/package.json"
            "custom-node/package-lock.json"
            "custom-node/README.md"
            "custom-node/tsconfig.json"
            "LICENSE"
            "README.md"
            "SECURITY.md"
            "CODE_OF_CONDUCT.md"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "${f}" ]; then
              echo "Missing required file: ${f}"
              exit 1
            fi
          done
          echo "All required governance files present."

      - name: Get package version
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./custom-node/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${version}"

      - name: Check if version already exists on npm
        id: check_npm
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.version }}"
          PKG="n8n-nodes-openbox-hook"
          if npm view "${PKG}@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "Version ${VERSION} already exists on npm — skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} is new — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Quality (runs after governance, parallel with security)
# ─────────────────────────────────────────────────────────────────────────────
  release-quality:
    name: Release Quality
    runs-on: ubuntu-latest
    needs:
      - release-governance
    if: needs.release-governance.outputs.should_publish == 'true'

    defaults:
      run:
        working-directory: custom-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: custom-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build

      - name: Smoke test (node load)
        run: npm run smoke:load

      - name: Run tests
        run: npm run test

      - name: Verify pack contents
        shell: bash
        run: |
          set -euo pipefail
          pack_output=$(npm pack --dry-run 2>&1)
          echo "$pack_output"
          if ! echo "$pack_output" | grep -q "dist/"; then
            echo "ERROR: dist/ not found in pack output"
            exit 1
          fi
          echo "Pack contents look correct."

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3a — Security: Trivy (parallel with quality and gitleaks)
# Scans only production dependencies (not dev deps — they are not shipped).
# ─────────────────────────────────────────────────────────────────────────────
  release-security-trivy:
    name: Release Security (Trivy)
    runs-on: ubuntu-latest
    needs:
      - release-governance
    if: needs.release-governance.outputs.should_publish == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.69.2

      - name: Run Trivy filesystem scan (console)
        id: trivy_console
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs custom-node \
            --scanners vuln \
            --vuln-type library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --skip-dirs node_modules \
            --format table \
            --exit-code 1

      - name: Run Trivy filesystem scan (SARIF)
        if: always()
        shell: bash
        run: |
          trivy fs custom-node \
            --scanners vuln \
            --vuln-type library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --skip-dirs node_modules \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release

      - name: Fail on vulnerabilities
        if: steps.trivy_console.outcome == 'failure'
        run: |
          echo "Trivy found HIGH/CRITICAL vulnerabilities in production dependencies. Release blocked."
          exit 1

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3b — Security: Gitleaks (parallel with quality and trivy)
# ─────────────────────────────────────────────────────────────────────────────
  release-security-secrets:
    name: Release Security (Gitleaks)
    runs-on: ubuntu-latest
    needs:
      - release-governance
    if: needs.release-governance.outputs.should_publish == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          gitleaks dir . \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-results.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks-release

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 — Publish (only after all 3 prior stages pass)
# ─────────────────────────────────────────────────────────────────────────────
  release-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - release-governance
      - release-quality
      - release-security-trivy
      - release-security-secrets
    if: needs.release-governance.outputs.should_publish == 'true'

    defaults:
      run:
        working-directory: custom-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (with npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: custom-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release-governance.outputs.version }}
          name: "n8n-nodes-openbox-hook v${{ needs.release-governance.outputs.version }}"
          body: |
            ## n8n-nodes-openbox-hook v${{ needs.release-governance.outputs.version }}

            OpenBox governance community node for n8n.

            **Install in n8n:** Settings → Community Nodes → Install → `n8n-nodes-openbox-hook`

            📦 [npm package](https://www.npmjs.com/package/n8n-nodes-openbox-hook)
            📖 [Docs](https://docs.openbox.ai/integrations/n8n)
          generate_release_notes: true
