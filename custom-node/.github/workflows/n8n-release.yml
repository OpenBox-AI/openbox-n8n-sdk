name: Release n8n Node

# Triggers on semver tags pushed from inside example/n8n/custom-node.
# Run locally to start a release:
#
#   cd example/n8n/custom-node
#   npm version patch|minor|major   # bumps package.json + creates git tag
#   git push && git push --tags     # push commit + tag → triggers this workflow
#
# One-time npm setup (OIDC Trusted Publishing — no long-lived secrets):
#   1. Log in to npmjs.com → package settings → Publish access → Trusted Publishers.
#   2. Add a publisher: GitHub Actions, owner=OpenBox-AI, repo=openbox-sdk, workflow=n8n-release.yml
#   3. Leave NPM_TOKEN unset. GitHub's OIDC token is used instead.
#
# Fallback (npm token):
#   Add NPM_TOKEN to repo secrets (Settings → Secrets → Actions).

on:
  push:
    tags:
      - "n8n-*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to release (e.g. 0.1.2)"
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: n8n-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  GITLEAKS_VERSION: "8.30.0"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Governance
# Validates tag format and presence of required files before anything builds.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag format
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          # Accepts n8n-X.Y.Z tags (pushed by `npm version`) and bare X.Y.Z
          # (workflow_dispatch with manual tag input).
          version="${TAG_NAME#n8n-}"
          pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          if [[ ! "${version}" =~ ${pattern} ]]; then
            echo "Invalid release tag: ${TAG_NAME}"
            echo "Expected format: n8n-<major>.<minor>.<patch>"
            exit 1
          fi
          echo "Tag is valid: ${TAG_NAME} → version ${version}"

      - name: Verify required files exist
        shell: bash
        run: |
          set -euo pipefail
          # Files that must exist in the custom-node package
          package_files=(
            "example/n8n/custom-node/package.json"
            "example/n8n/custom-node/package-lock.json"
            "example/n8n/custom-node/tsconfig.json"
            "example/n8n/custom-node/README.md"
          )
          # Root-level governance files shared across the monorepo
          root_files=(
            "LICENSE"
            "SECURITY.md"
            "CODE_OF_CONDUCT.md"
          )
          for f in "${package_files[@]}" "${root_files[@]}"; do
            if [ ! -f "${f}" ]; then
              echo "Missing required file: ${f}"
              exit 1
            fi
          done
          echo "All required governance files present."

      - name: Verify package.json version matches tag
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${TAG_NAME#n8n-}"
          pkg_version=$(node -p "require('./example/n8n/custom-node/package.json').version")
          if [[ "${tag_version}" != "${pkg_version}" ]]; then
            echo "Tag version (${tag_version}) does not match package.json version (${pkg_version})"
            exit 1
          fi
          echo "Version match: ${pkg_version}"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Quality
# Full build → typecheck → unit tests → pack validation.
# ─────────────────────────────────────────────────────────────────────────────
  release-quality:
    name: Release Quality
    runs-on: ubuntu-latest
    needs:
      - release-governance

    defaults:
      run:
        working-directory: example/n8n/custom-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: example/n8n/custom-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build

      - name: Smoke test (node load)
        run: npm run smoke:load

      - name: Run tests
        run: npm run test

      - name: Verify pack contents
        shell: bash
        run: |
          set -euo pipefail
          pack_output=$(npm pack --dry-run 2>&1)
          echo "$pack_output"
          if ! echo "$pack_output" | grep -q "dist/"; then
            echo "ERROR: dist/ not found in pack output"
            exit 1
          fi
          echo "Pack contents look correct."

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Security
# Trivy dependency scan + Gitleaks secret scan.
# Both run in parallel, both must pass before publish.
# ─────────────────────────────────────────────────────────────────────────────
  release-security-trivy:
    name: Release Security (Trivy)
    runs-on: ubuntu-latest
    needs:
      - release-governance
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.69.2

      - name: Run Trivy filesystem scan (console)
        id: trivy_console
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs example/n8n/custom-node \
            --scanners vuln,misconfig \
            --vuln-type library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --format table \
            --exit-code 1

      - name: Run Trivy filesystem scan (SARIF)
        if: always()
        shell: bash
        run: |
          trivy fs example/n8n/custom-node \
            --scanners vuln,misconfig \
            --vuln-type library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-n8n-release

      - name: Fail on vulnerabilities
        if: steps.trivy_console.outcome == 'failure'
        run: |
          echo "Trivy found HIGH/CRITICAL vulnerabilities. Release blocked."
          exit 1

  release-security-secrets:
    name: Release Security (Gitleaks)
    runs-on: ubuntu-latest
    needs:
      - release-governance
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          gitleaks dir example/n8n/custom-node \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-results.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks-n8n-release

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 — Publish
# Publishes to npm with provenance attestation (required by n8n Creator Portal
# for verified community nodes since May 1 2026).
# ─────────────────────────────────────────────────────────────────────────────
  release-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - release-quality
      - release-security-trivy
      - release-security-secrets

    defaults:
      run:
        working-directory: example/n8n/custom-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (with npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: example/n8n/custom-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure npm token (Option B fallback)
        if: env.NPM_TOKEN != ''
        shell: bash
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "n8n-nodes-openbox-hook ${{ github.ref_name }}"
          body: |
            ## n8n-nodes-openbox-hook ${{ github.ref_name }}

            OpenBox governance community node for n8n.

            **Install in n8n:** Settings → Community Nodes → Install → `n8n-nodes-openbox-hook`

            📦 [npm package](https://www.npmjs.com/package/n8n-nodes-openbox-hook)
            📖 [Docs](https://docs.openbox.ai/integrations/n8n)
          generate_release_notes: true
