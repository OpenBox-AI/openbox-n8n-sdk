# Hosted-OpenBox override.
#
# Removes the local openbox-local_default network dependency and the
# seed/guardrails services that only exist when running a local OpenBox stack.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hosted.yml up --build
#
# OPENBOX_API_URL and OPENBOX_API_KEY are read from .env

networks:
  openbox:
    # Replace the external: true reference with a plain internal network.
    # n8n talks to hosted OpenBox over the internet, not over Docker networking.
    external: false
    name: openbox-hosted-internal

services:
  postgres:
    volumes:
      - postgres_storage:/var/lib/postgresql/data
      - ./seed/init-demo-schema.sql:/docker-entrypoint-initdb.d/init-demo-schema.sql:ro

  seed:
    # Stub out the seed service — API key is provided directly via .env
    image: busybox
    networks: []
    restart: 'no'
    command: ['sh', '-c', 'echo "seed: skipped (hosted mode)"']
    volumes: []
    environment: {}

  guardrails:
    # Stub out the local guardrails shim — hosted OpenBox has its own guardrails
    image: busybox
    networks: []
    restart: 'no'
    command: ['sh', '-c', 'echo "guardrails: skipped (hosted mode)"']
    environment: {}

  ollama:
    # Stub out Ollama — using OpenAI instead. Must stay running for healthcheck.
    image: busybox
    networks: []
    restart: 'no'
    entrypoint: ['sh', '-c', 'echo "ollama: skipped (hosted mode)" && sleep infinity']
    healthcheck:
      test: ['CMD', 'true']
      interval: 1s
      timeout: 1s
      retries: 1
      start_period: 1s

  ollama-pull:
    # Stub out Ollama model pull — not needed with OpenAI
    image: busybox
    networks: []
    restart: 'no'
    entrypoint: ['sh', '-c', 'echo "ollama-pull: skipped (hosted mode)"']

  n8n:
    environment:
      OPENBOX_API_URL: ${OPENBOX_API_URL:-https://core.openbox.ai}
      OPENBOX_API_KEY: ${OPENBOX_API_KEY}
      OPENROUTER_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_BASE_URL: https://api.openai.com/v1
      OPENROUTER_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      N8N_RUNNERS_ENABLED: 'false'
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./workflows:/demo-data/workflows
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      guardrails:
        condition: service_started
