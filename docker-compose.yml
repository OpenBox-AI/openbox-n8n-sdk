# n8n + OpenBox hosted integration.
#
# Prerequisites: copy .env.example → .env and fill in your keys, then:
#
#   docker compose up --build
#
# n8n: http://localhost:5678
# OpenBox Core: https://core.openbox.ai

volumes:
  n8n_storage:
  postgres_storage:
  odoo_storage:
  odoo_postgres_storage:

networks:
  internal:

services:
  postgres:
    image: postgres:16-alpine
    networks: [internal]
    restart: unless-stopped
    ports: ['5433:5432']
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}']
      interval: 5s
      timeout: 3s
      retries: 20

  odoo-postgres:
    image: postgres:16-alpine
    profiles: ['odoo']
    networks: [internal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ODOO_POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${ODOO_POSTGRES_DB:-postgres}
    volumes:
      - odoo_postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${ODOO_POSTGRES_USER:-odoo} -d ${ODOO_POSTGRES_DB:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 20

  odoo:
    image: odoo:17
    profiles: ['odoo']
    networks: [internal]
    restart: unless-stopped
    ports: ['8069:8069']
    environment:
      HOST: odoo-postgres
      USER: ${ODOO_POSTGRES_USER:-odoo}
      PASSWORD: ${ODOO_POSTGRES_PASSWORD:-odoo}
    volumes:
      - odoo_storage:/var/lib/odoo
    depends_on:
      odoo-postgres:
        condition: service_healthy

  n8n-import:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    user: root
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-example-only-encryption-key}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:-example-only-jwt-secret}
      OPENBOX_API_KEY: ${OPENBOX_API_KEY:-}
      OPENBOX_API_URL: ${OPENBOX_API_URL:-https://core.openbox.ai}
      OPENBOX_AGENT_DID: ${OPENBOX_AGENT_DID:-}
      OPENBOX_AGENT_PRIVATE_KEY: ${OPENBOX_AGENT_PRIVATE_KEY:-}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        DEST=/home/node/.n8n/custom/n8n-nodes-openbox-hook
        rm -rf "$$DEST"
        mkdir -p "$$DEST"
        cp -r /opt/custom-nodes/n8n-nodes-openbox-hook/. "$$DEST/"
        chown -R node:node /home/node/.n8n/custom
        if [ -z "$$(N8N_LOG_LEVEL=error n8n list:workflow --onlyId 2>/dev/null)" ]; then
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows exist, skipping import"
        fi
        TPL=/demo-data/credentials/openbox.template.json
        OUT=/demo-data/credentials/openbox.json
        if [ -f "$$TPL" ] && [ ! -f "$$OUT" ] && [ -n "$${OPENBOX_API_KEY:-}" ]; then
          sed -e "s|__OPENBOX_API_KEY__|$$OPENBOX_API_KEY|" \
              -e "s|__OPENBOX_URL__|$${OPENBOX_API_URL:-https://core.openbox.ai}|" \
              -e "s|__OPENBOX_AGENT_DID__|$${OPENBOX_AGENT_DID:-}|" \
              -e "s|__OPENBOX_AGENT_PRIVATE_KEY__|$${OPENBOX_AGENT_PRIVATE_KEY:-}|" \
              "$$TPL" > "$$OUT"
          echo "[n8n-import] materialized $$OUT"
        fi
        if ls /demo-data/credentials/*.json >/dev/null 2>&1; then
          n8n import:credentials --separate --input=/demo-data/credentials || true
        fi
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./workflows:/demo-data/workflows
      - ./demo-data/credentials:/demo-data/credentials
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    restart: unless-stopped
    ports: ['5678:5678']
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-example-only-encryption-key}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:-example-only-jwt-secret}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      N8N_RUNNERS_ENABLED: 'true'
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-gpt-4o-mini}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENBOX_API_URL: ${OPENBOX_API_URL:-https://core.openbox.ai}
      OPENBOX_API_KEY: ${OPENBOX_API_KEY:-}
      OPENBOX_AGENT_DID: ${OPENBOX_AGENT_DID:-}
      OPENBOX_AGENT_PRIVATE_KEY: ${OPENBOX_AGENT_PRIVATE_KEY:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      HUBSPOT_CRM_ENABLED: ${HUBSPOT_CRM_ENABLED:-false}
      N8N_OTEL_ENABLED: ${N8N_OTEL_ENABLED:-false}
      N8N_OTEL_EXPORTER_OTLP_ENDPOINT: ${N8N_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      N8N_OTEL_TRACES_INCLUDE_NODE_SPANS: ${N8N_OTEL_TRACES_INCLUDE_NODE_SPANS:-true}
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
